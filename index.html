<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WELLCOME TO OPEN</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      @font-face {
        font-family: "Pretendard";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Bold.woff2")
          format("woff2");
        font-weight: 700;
        font-display: swap;
      }

      :root {
        --black: #000000;
        --blue: #1155cc;
        --gray: #dedede;
        --white: #ffffff;
        --nav-gray: #c2c2c2;
        --desktop-tape-height: 450px;
        --desktop-text-height: 64px;
        --margin-v: 30px;
        --col-base-width: 46px;
        --info-width: 600px;
        --guest-name-y: 0px;
        --guest-message-y: -2px;
        --guest-time-y: -4px;
        --guest-reply-name-y: -8px;
        --guest-reply-y: -11px;
        --guest-reply-time-y: -22px;
        --top-description-y: 0px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      ::selection {
        background: var(--blue);
        color: var(--white);
      }

      ::-moz-selection {
        background: var(--blue);
        color: var(--white);
      }

      .keep-all {
        word-break: keep-all;
        line-height: 1.6;
      }

      .desc-text {
        white-space: pre-line;
      }

      body {
        background-color: var(--white);
        width: 100%;
        height: 100vh;
        font-family: "Pretendard", sans-serif;
        font-weight: 700;
        overflow: hidden;
      }

      #cameraBackground {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        opacity: 0;
        pointer-events: none;
        z-index: 0;
        transform: scaleX(-1);
        transition: opacity 0.4s ease;
      }

      body.camera-mask-on #cameraBackground {
        opacity: 1;
      }

      #imageBackground {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        opacity: 0;
        pointer-events: none;
        z-index: 0;
        transition: opacity 0.4s ease;
      }

      body.image-mask-on #imageBackground {
        opacity: 1;
      }

      .container {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 1440px;
        height: 100%;
        margin: 0 auto;
        padding: var(--margin-v) 0;
        position: relative;
        z-index: 1;
      }

      .section {
        width: 100%;
        height: var(--desktop-tape-height);
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: none;
        -ms-overflow-style: none;
        z-index: 10;
        position: relative;
      }

      .section::-webkit-scrollbar {
        display: none;
      }

      .punch-paper {
        display: flex;
        width: max-content;
        margin-left: 30px;
        background-color: var(--gray);
        clip-path: polygon(0 50%, 168px 0, 100% 0, 100% 100%, 168px 100%);
        padding-left: 168px;
        position: relative;
      }

      body.camera-mask-on .punch-paper::before,
      body.image-mask-on .punch-paper::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 168px;
        height: 100%;
        background-color: var(--gray);
        clip-path: polygon(0 50%, 100% 0, 100% 100%);
        pointer-events: none;
        z-index: 0;
      }

      .tape-body {
        display: flex;
        height: var(--desktop-tape-height);
        padding-right: 100px;
      }
      #suggestTape {
        padding-right: 428px;
      }

      #alphabetTape {
        padding-left: 0;
        padding-right: 0;
      }

      body.mode-intro .alphabet-section .punch-paper {
        margin-left: 30px;
        transform: translateX(100vw);
      }

      .alphabet-section {
        display: none;
      }

      body.mode-intro .alphabet-section {
        display: block;
      }

      body.mode-intro #topSection {
        display: none;
      }

      body.mode-open #topSection,
      body.mode-compare #topSection,
      body.mode-suggest #topSection {
        display: block;
      }

      body.mode-opening #topSection {
        display: block;
      }

      body.mode-opening #topTape .item-column {
        animation: categoryFold 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      body.mode-opening #bottomCompareGroup,
      body.mode-opening #bottomSuggestGroup {
        display: none;
      }

      .alphabet-column {
        display: flex;
        width: var(--col-base-width);
        height: 100%;
        flex-shrink: 0;
        overflow: hidden;
        position: relative;
      }

      .alphabet-label {
        position: absolute;
        left: 50%;
        bottom: 30px;
        transform: translateX(-50%) rotate(-90deg);
        transform-origin: center;
        white-space: nowrap;
        font-size: 16px;
        line-height: 1;
      }
      .item-column {
        display: flex;
        width: var(--col-base-width);
        height: 100%;
        flex-shrink: 0;
        overflow: hidden;
        transition: width 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        position: relative;
      }

      .item-column.expanded {
        width: calc(var(--col-base-width) + var(--info-width));
      }

      .hole-area {
        width: var(--col-base-width);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 30px;
        flex-shrink: 0;
        position: relative;
      }

      .hole-mask-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: none;
        pointer-events: none;
        z-index: 0;
      }

      .hole {
        border-radius: 50%;
        background-color: var(--gray);
        flex-shrink: 0;
        transition: background-color 0.3s;
        position: relative;
        z-index: 1;
      }

      .hole.active {
        background-color: var(--white);
      }

      body.camera-mask-on .punch-paper,
      body.image-mask-on .punch-paper {
        background-color: transparent;
      }

      body.camera-mask-on .hole-area,
      body.image-mask-on .hole-area {
        background-color: transparent;
      }

      body.camera-mask-on .hole-area .hole.active,
      body.camera-mask-on .hole-area .hole.half,
      body.camera-mask-on .hole-area .hole.blink-hole,
      body.camera-mask-on .hole-area .hole.outline-hole,
      body.image-mask-on .hole-area .hole.active,
      body.image-mask-on .hole-area .hole.half,
      body.image-mask-on .hole-area .hole.blink-hole,
      body.image-mask-on .hole-area .hole.outline-hole {
        opacity: 0;
      }

      .mask-hole-move-horizontal {
        animation: maskMoveHorizontal 1.2s ease-in-out infinite alternate;
      }

      .mask-hole-move-down {
        animation: maskMoveDown 1.4s ease-in-out infinite;
      }

      .mask-hole-move-up {
        animation: maskMoveUp 1.4s ease-in-out infinite;
      }

      .mask-hole-blink {
        animation: maskBlinkHole 1.5s steps(1) infinite;
      }

      @keyframes maskMoveHorizontal {
        from {
          transform: translateX(-6px);
        }
        to {
          transform: translateX(6px);
        }
      }

      @keyframes maskMoveDown {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(8px);
        }
      }

      @keyframes maskMoveUp {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      @keyframes maskBlinkHole {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }

      body.camera-mask-on .hole-area .hole-mask-svg,
      body.camera-mask-on .suggest-hole-area .hole-mask-svg,
      body.camera-mask-on .suggest-fixed-hole-area .hole-mask-svg,
      body.image-mask-on .hole-area .hole-mask-svg,
      body.image-mask-on .suggest-hole-area .hole-mask-svg,
      body.image-mask-on .suggest-fixed-hole-area .hole-mask-svg {
        display: block;
      }

      body.camera-mask-on .info-frame,
      body.camera-mask-on .suggest-content,
      body.camera-mask-on #suggestLayer,
      body.image-mask-on .info-frame,
      body.image-mask-on .suggest-content,
      body.image-mask-on #suggestLayer {
        background-color: var(--gray);
      }

      body.camera-mask-on .suggest-hole-area,
      body.camera-mask-on .suggest-fixed-hole-area,
      body.image-mask-on .suggest-hole-area,
      body.image-mask-on .suggest-fixed-hole-area {
        background-color: transparent;
      }

      body.camera-mask-on .suggest-hole-area .hole.active,
      body.camera-mask-on .suggest-fixed-hole-area .hole.active,
      body.image-mask-on .suggest-hole-area .hole.active,
      body.image-mask-on .suggest-fixed-hole-area .hole.active {
        opacity: 0;
      }

      .hole.large {
        width: 22px;
        height: 22px;
        margin-bottom: 24px;
      }

      .hole.small {
        width: 12px;
        height: 12px;
        margin-top: 5px;
        margin-bottom: 29px;
      }

      .info-frame {
        width: var(--info-width);
        height: 100%;
        padding: 30px 12px;
        flex-shrink: 0;
        display: flex;
        gap: 20px;
        position: relative;
      }

      .column-a {
        width: 60px;
        display: flex;
        flex-direction: column;
        font-size: 16px;
        line-height: 1.6;
      }

      .column-b {
        flex: 1;
        display: flex;
        flex-direction: column;
        font-size: 16px;
        line-height: 1.6;
        padding-right: 12px;
        position: relative;
      }

      .info-row {
        height: 22px;
        min-height: 22px;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        white-space: nowrap;
      }

      .info-row.inactive {
        visibility: hidden;
      }

      .title-desc-box {
        height: 164px;
        min-height: 164px;
        max-height: 164px;
        white-space: normal;
        word-break: keep-all;
        line-height: 1.6;
        text-align: left;
        width: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior: contain;
        display: block;

        align-items: initial;
      }

      .top-description-box {
        position: absolute;
        top: calc(228px + var(--top-description-y));
        left: 0;
        right: 12px;
        margin-bottom: 0;
        transform: none;
      }

      .open-blue {
        color: var(--blue);
      }

      .suggest-column {
        display: flex;
        width: 262px;
        height: 450px;
        flex-shrink: 0;
        overflow: hidden;
      }

      .suggest-hole-area {
        width: 54px;
        height: 450px;
        padding-top: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
        position: relative;
      }

      .suggest-fixed-hole-area {
        position: absolute;
        top: 0;
        right: 374px;
        width: 54px;
        height: 450px;
        padding-top: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
        background-color: var(--gray);
        border-left: 1px solid var(--black);
        z-index: 99;
        pointer-events: none;
      }

      .suggest-content {
        width: 208px;
        height: 450px;
        padding: 30px 0;
        font-size: 16px;
        line-height: 1.6;
        flex-shrink: 0;
      }

      .guest-name {
        height: 22px;
        margin-bottom: 24px;
        white-space: nowrap;
        transform: translateY(var(--guest-name-y));
      }

      .guest-message {
        height: 114px;
        margin-bottom: 29px;
        word-break: keep-all;
        white-space: normal;
        overflow-x: hidden;
        overflow-y: auto;
        transform: translateY(var(--guest-message-y));
        overscroll-behavior: contain;
      }

      .guest-time {
        height: 22px;
        margin-bottom: 29px;
        white-space: nowrap;
        transform: translateY(var(--guest-time-y));
      }

      .guest-reply-name {
        height: 22px;
        margin-bottom: 24px;
        white-space: nowrap;
        transform: translateY(var(--guest-reply-name-y));
      }

      .guest-reply {
        height: 80px;
        margin-bottom: 24px;
        word-break: keep-all;
        white-space: normal;
        overflow-x: hidden;
        overflow-y: auto;
        transform: translateY(var(--guest-reply-y));
        overscroll-behavior: contain;
      }

      .guest-reply-time {
        height: 22px;
        white-space: nowrap;
        transform: translateY(var(--guest-reply-time-y));
      }

      @media (max-width: 800px), (max-height: 874px) {
        :root {
          --desktop-tape-height: 450px;
          --desktop-text-height: 64px;
          --margin-v: 30px;
        }
      }

      @media (max-width: 402px), (max-height: 874px) {
        :root {
          --col-base-width: 46px;
          --info-width: 600px;
        }
      }

      .item-column.compare-column .column-a {
        width: 100px;
      }

      .item-column.compare-column .info-frame {
        gap: 20px;
      }

      .compare-image-row {
        height: 22px;
        min-height: 22px;
        max-height: 22px;
        margin-bottom: 24px;
        align-items: flex-start;
        overflow: visible;
        display: block;
        position: relative;
        z-index: 2;
      }

      .compare-image-strip {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 114px;
        display: flex;
        gap: 12px;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: none;
        -ms-overflow-style: none;
        overscroll-behavior: contain;
        z-index: 2;
      }

      .compare-image-strip::-webkit-scrollbar {
        display: none;
      }

      .compare-image-placeholder,
      .compare-image-strip img {
        height: 114px;
        width: auto;
        min-width: 114px;
        flex-shrink: 0;
        object-fit: cover;
        background-color: var(--white);
        display: block;
      }

      .compare-image-placeholder.wide {
        min-width: 180px;
      }

      .compare-image-placeholder.xwide {
        min-width: 240px;
      }

      .compare-image-placeholder.narrow {
        min-width: 96px;
      }

      .middle-bar {
        position: relative;
        width: 100%;
        height: var(--desktop-text-height);
        display: flex;
        align-items: center;
        padding: 0 30px;
        font-size: 16px;
        z-index: 300;
      }

      .left-info {
        display: flex;
        align-items: center;
        position: relative;
      }

      #nav-open {
        margin-right: 60px;
        cursor: pointer;
      }

      #nav-compare {
        margin-right: 40px;
        cursor: pointer;
      }

      #nav-suggest {
        cursor: pointer;
      }

      .category-dropdown-wrap {
        position: relative;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: 40px;
        cursor: pointer;
        user-select: none;
      }

      #categoryToggle {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .category-triangle {
        width: 0;
        height: 0;
        border-top: 8px solid transparent;
        border-bottom: 8px solid transparent;
        border-left: 6px solid var(--gray);
        flex-shrink: 0;
        transition: transform 0.3s ease;
      }

      .category-dropdown-wrap.open .category-triangle {
        border-left: none;
        border-right: 6px solid var(--gray);
      }

      .category-menu {
        position: absolute;
        top: 50%;
        left: calc(100% + 16px);
        height: 32px;
        display: flex;
        align-items: center;
        background-color: transparent;
        opacity: 1;
        transform: translate(0, -50%);
        clip-path: inset(0 100% 0 0);
        pointer-events: none;
        transition: clip-path 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 500;
      }

      .category-dropdown-wrap.open .category-menu {
        clip-path: inset(0 0 0 0);
        pointer-events: auto;
      }

      .category-option {
        width: 64px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-left: 1px solid var(--white);
        background-color: var(--gray);
        color: var(--black);
        white-space: nowrap;
      }

      .category-option.active {
        background-color: #c8c8c8;
        color: var(--black);
      }
      body.camera-mask-on .category-option,
      body.image-mask-on .category-option {
        border-left: none;

        margin-left: 1px;
      }

      body.camera-mask-on .category-menu-start + .category-option,
      body.camera-mask-on .category-option:first-of-type,
      body.image-mask-on .category-menu-start + .category-option,
      body.image-mask-on .category-option:first-of-type {
        margin-left: 0;
      }
      .category-menu-start {
        width: 12px;
        height: 32px;
        background-color: var(--gray);
        clip-path: polygon(100% 0, 0 50%, 100% 100%);
        flex-shrink: 0;
      }

      .category-menu-start + .category-option {
        border-left: none;
      }

      .category-option:first-of-type {
        border-left: none;
      }

      .item-column.category-hidden {
        display: none;
      }

      .item-column.category-folding {
        animation: categoryFold 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .item-column.category-unfold-refold {
        animation: categoryUnfoldRefold 2.2s forwards;
      }

      @keyframes categoryFold {
        from {
          width: calc(var(--col-base-width) + var(--info-width));
        }
        to {
          width: var(--col-base-width);
        }
      }

      @keyframes categoryUnfoldRefold {
        0% {
          width: var(--col-base-width);
          animation-timing-function: linear;
        }

        30% {
          width: calc(var(--col-base-width) + var(--info-width));
          animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
        }

        100% {
          width: var(--col-base-width);
        }
      }

      .category-word-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 1000;
        opacity: 0;
      }

      .category-word-overlay.visible {
        animation: categoryWordFlash 2.5s ease forwards;
      }

      .category-word-grid {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: clamp(6px, 0.8vw, 14px);
        transform-origin: center center;
        will-change: transform;
      }

      .category-word-column {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: clamp(6px, 0.8vw, 14px);
      }

      .category-word-dot {
        width: clamp(10px, 1.8vw, 30px);
        height: clamp(10px, 1.8vw, 30px);
        border-radius: 50%;
        background-color: #1155cc;
      }

      .category-word-gap {
        width: clamp(10px, 1.8vw, 30px);
        height: clamp(10px, 1.8vw, 30px);
        flex-shrink: 0;
        opacity: 0;
      }

      @keyframes categoryWordFlash {
        0% {
          opacity: 0;
        }
        12% {
          opacity: 1;
        }
        78% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      .right-info {
        position: absolute;
        right: 30px;
        display: flex;
        align-items: center;
        gap: 40px;
        font-family: Arial, sans-serif;
        font-weight: bold;
        white-space: nowrap;
        text-underline-offset: auto;
      }

      #cameraToggle {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background-color: #dedede;
        cursor: pointer;
        flex-shrink: 0;
        font-size: 0;
        line-height: 0;
        color: transparent;
        transition:
          opacity 0.2s ease,
          background-color 0.2s ease;
      }

      #cameraToggle:hover {
        opacity: 0.5;
      }

      body.camera-mask-on #cameraToggle {
        background-color: #ffffff;
      }

      body.camera-mask-on #cameraToggle:hover {
        opacity: 0.5;
      }

      .playlist-link {
        color: var(--blue);
        text-decoration: underline;
        cursor: pointer;
      }

      .bottom-area {
        position: relative;
        flex: 1;
        overflow: hidden;
      }

      #descriptionWrapper {
        position: absolute;
        top: 0;
        left: 30px;
        width: 540px;
        opacity: 1;
        transition: opacity 0.4s ease;
        z-index: 5;
        display: flex;
        align-items: flex-start;
      }

      .bottom-group {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        transform: translateY(100%);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          transform 0.8s cubic-bezier(0.16, 1, 0.3, 1),
          opacity 0.6s ease,
          visibility 0.8s;
        z-index: 10;
      }

      body.mode-compare #bottomCompareGroup,
      body.mode-suggest #bottomSuggestGroup {
        transform: translateY(0);
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      body.mode-compare #descriptionWrapper,
      body.mode-suggest #descriptionWrapper {
        opacity: 0;
        pointer-events: none;
      }

      #suggestLayer {
        position: absolute;
        top: 0;
        right: 0;
        width: 374px;
        height: 450px;
        padding: 32px 42px 30px 12px;
        background-color: var(--gray);
        z-index: 100;
      }

      .suggest-inner {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .name-row {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 20px;
        flex-shrink: 0;
      }

      .underline-wrapper {
        position: relative;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      #nameInput {
        width: 100%;
        border: none;
        background: transparent;
        font-family: inherit;
        font-weight: 700;
        font-size: 16px;
        outline: none;
        margin-bottom: 4px;
      }

      .input-stroke {
        height: 1px;
        background-color: #000;
        width: 100%;
      }

      .msg-box {
        width: 320px;
        border: 1px solid #000;
        background: transparent;

      function createHoleMaskSvg(maskItems, width = 46, height = 450) {
        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgNS, "svg");
        const maskId = `hole-mask-${holeMaskIdCounter++}`;
        const x = width / 2;
        const centers = [41, 87, 133, 179, 225, 271, 317, 363, 409];

        const normalizedItems = (maskItems || []).map((item) => {
          if (typeof item === "number") {
            return { index: item, classes: [], opacity: 1, mode: "circle" };
          }

          return {
            index: item.index,
            classes: item.classes || [],
            opacity: item.opacity ?? 1,
            mode: item.mode || "circle",
          };
        });

        svg.setAttribute("class", "hole-mask-svg");
        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
        svg.setAttribute("preserveAspectRatio", "none");
        svg.setAttribute("aria-hidden", "true");

        const defs = document.createElementNS(svgNS, "defs");
        const mask = document.createElementNS(svgNS, "mask");
        mask.setAttribute("id", maskId);
        mask.setAttribute("maskUnits", "userSpaceOnUse");

        const maskRect = document.createElementNS(svgNS, "rect");
        maskRect.setAttribute("x", "0");
        maskRect.setAttribute("y", "0");
        maskRect.setAttribute("width", String(width));
        maskRect.setAttribute("height", String(height));
        maskRect.setAttribute("fill", "white");
        mask.appendChild(maskRect);

        normalizedItems.forEach((item) => {
          if (!Number.isFinite(item.index)) return;

          const cy = centers[item.index] || 0;
          const r = item.index === 3 ? 6 : 11;
          let maskShape;

          if (item.mode === "half") {
            maskShape = document.createElementNS(svgNS, "path");
            maskShape.setAttribute(
              "d",
              `M ${x} ${cy - r} A ${r} ${r} 0 0 0 ${x} ${cy + r} L ${x} ${cy - r} Z`,
            );
          } else if (item.mode === "outline") {
            maskShape = document.createElementNS(svgNS, "circle");
            maskShape.setAttribute("cx", String(x));
            maskShape.setAttribute("cy", String(cy));
            maskShape.setAttribute("r", String(r));
            maskShape.setAttribute("fill", "none");
            maskShape.setAttribute("stroke", "black");
            maskShape.setAttribute("stroke-width", "3");
            maskShape.setAttribute("stroke-dasharray", "3 3");
            maskShape.setAttribute("stroke-linecap", "round");
          } else {
            maskShape = document.createElementNS(svgNS, "circle");
            maskShape.setAttribute("cx", String(x));
            maskShape.setAttribute("cy", String(cy));
            maskShape.setAttribute("r", String(r));
            maskShape.setAttribute("fill", "black");
          }

          if (item.mode !== "outline") {
            const alpha = Math.max(0, Math.min(1, item.opacity));
            const gray = Math.round(255 * (1 - alpha));
            maskShape.setAttribute("fill", `rgb(${gray}, ${gray}, ${gray})`);
          }

          if (item.classes.includes("move-horizontal")) {
            maskShape.classList.add("mask-hole-move-horizontal");
          }
          if (item.classes.includes("move-down")) {
            maskShape.classList.add("mask-hole-move-down");
          }
          if (item.classes.includes("move-up")) {
            maskShape.classList.add("mask-hole-move-up");
          }
          if (item.classes.includes("blink-hole")) {
            maskShape.classList.add("mask-hole-blink");
          }

          mask.appendChild(maskShape);
        });

        defs.appendChild(mask);

        const rect = document.createElementNS(svgNS, "rect");
        rect.setAttribute("x", "0");
        rect.setAttribute("y", "0");
        rect.setAttribute("width", String(width));
        rect.setAttribute("height", String(height));
        rect.setAttribute("fill", "#dedede");
        rect.setAttribute("mask", `url(#${maskId})`);

        svg.appendChild(defs);
        svg.appendChild(rect);

        return svg;
      }

      function parseCSV(text) {
        const rows = [];
        let row = [];
        let cell = "";
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
          const char = text[i];
          const next = text[i + 1];

          if (char === '"' && next === '"') {
            cell += '"';
            i++;
          } else if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === "," && !inQuotes) {
            row.push(cell);
            cell = "";
          } else if ((char === "\n" || char === "\r") && !inQuotes) {
            if (char === "\r" && next === "\n") i++;
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
          } else {
            cell += char;
          }
        }

        if (cell || row.length) {
          row.push(cell);
          rows.push(row);
        }

        const cleanRows = rows.filter((r) =>
          r.some((c) => String(c).trim() !== ""),
        );

        const headers = cleanRows[0].map((h) => h.trim());

        return cleanRows.slice(1).map((r) => {
          const obj = {};
          headers.forEach((h, i) => {
            obj[h] = (r[i] || "").trim();
          });
          return obj;
        });
      }

      async function loadCSV(gid) {
        const res = await fetch(CSV_URL(gid));

        if (!res.ok) {
          throw new Error(`CSV load failed: ${res.status}`);
        }

        const text = await res.text();
        return parseCSV(text);
      }

      function isConfiguredGid(gid) {

      async function loadOptionalCSV(gid) {
        if (!isConfiguredGid(gid)) return [];
        return loadCSV(gid);
      }

      function normalizeImageMap(raw) {
        const normalized = {};

        if (!raw) return normalized;

        if (Array.isArray(raw)) {
          raw.forEach((item) => {
            const id = String(item.id || item.item_id || "").trim();
            const urls = item.urls || item.images || item.image_urls || [];

            if (!id || !Array.isArray(urls)) return;
            normalized[id] = urls.filter(Boolean);
          });

          return normalized;
        }

        Object.entries(raw).forEach(([key, value]) => {
          const id = String(key).trim();

          if (Array.isArray(value)) {
            normalized[id] = value
              .map((item) => {
                if (typeof item === "string") return item;
                return item.image || item.url || item.thumbnail || "";
              })
              .filter(Boolean);
            return;
          }

          if (value && typeof value === "object") {
            const urls = value.urls || value.images || value.image_urls || [];

            if (Array.isArray(urls)) {
              normalized[id] = urls
                .map((item) => {
                  if (typeof item === "string") return item;
                  return item.image || item.url || item.thumbnail || "";
                })
                .filter(Boolean);
            }
          }
        });

        return normalized;
      }

            const raw = await res.json();
            const normalized = normalizeImageMap(raw);
            console.log("Image JSON loaded:", url, normalized);
            return normalized;
          } catch (err) {
            console.warn("Image JSON load skipped:", url, err);
          }
        }

        return {};
      }

      function createHoles(states, data = null, mode = "default") {
        const holes = document.createElement("div");
        holes.className = "hole-area";

        const topKeys = [
          null,
          null,
          null,
          null,
          "openness",
          "sharing",
          "participation",
          "contribution",
          "collaboration",
        ];

        const maskItems = [];

        states.forEach((state, i) => {
          const h = document.createElement("div");
          h.className = `hole ${i === 3 ? "small" : "large"}`;

          if (state === true) {
            h.classList.add("active");
            maskItems.push({ index: i, classes: ["active"], opacity: 1 });
          }

          if (typeof state === "string") {
            h.classList.add(state);

            if (state === "half") {
              maskItems.push({
                index: i,
                classes: [state],
                opacity: 1,
                mode: "half",

            if (state === "stage-2") {

            if (state === "outline-hole") {

            }
          }

          if (Array.isArray(state)) {
            state.forEach((cls) => h.classList.add(cls));
            if (state.includes("active")) {
              maskItems.push({ index: i, classes: state, opacity: 1 });
            }
          }

          if (mode === "top" && i >= 4 && i <= 8 && data) {
            h.classList.add("clickable-hole");

            h.addEventListener("click", (e) => {
              e.stopPropagation();

              const key = topKeys[i];
              data[key] = !data[key];

              const oldCol = h.closest(".item-column");
              const wasExpanded = oldCol.classList.contains("expanded");
              const newCol = createTopCol(data);

              oldCol.replaceWith(newCol);

              if (wasExpanded) {
                newCol.classList.add("expanded");
              }
            });
          }

          holes.appendChild(h);
        });

        holes.prepend(createHoleMaskSvg(maskItems));

        return holes;

          paddedBits[0] === "1",

          paddedBits[4] === "1",

      function buildAlphabetPatternMap(rows) {
        const map = {};

        rows.forEach((row) => {
          const letter = String(row.letter || "")
            .trim()
            .toUpperCase();
          const pattern = String(row.pattern || "").trim();

          if (!letter || !pattern) return;
          if (!map[letter]) map[letter] = [];

          map[letter].push({
            pattern,

            label: row.label || "",
          });
        });

        return map;
      }

      function buildKerningMap(rows) {
        const map = {};

        rows.forEach((row) => {
          const leftLabel = String(row.left_label || "")
            .trim()
            .toUpperCase();

          const rightLabel = String(row.right_label || "")
            .trim()
            .toUpperCase();

          const value = parseInt(String(row.gap || "").trim(), 10);

          if (!leftLabel || !rightLabel || !Number.isFinite(value)) return;

          map[`${leftLabel}|${rightLabel}`] = value;
        });

        return map;
      }

      function getKerningGap(
        leftLabel,
        rightLabel,
        kerningMap,
        defaultGap = 1,
      ) {
        const left = String(leftLabel || "")
          .trim()
          .toUpperCase();
        const right = String(rightLabel || "")
          .trim()
          .toUpperCase();

        if (!left || !right) return 0;

        const key = `${left}|${right}`;
        const adjustment = kerningMap[key];

        if (!Number.isFinite(adjustment)) return defaultGap;

        return Math.max(0, defaultGap + adjustment);
      }

        const key = String(letter || "").toUpperCase();
        const options = patternMap[key];

        if (!options || !options.length) return null;
        if (mode === "first") return options[0];

        return options[Math.floor(Math.random() * options.length)];

      function createScoreWordGrid(word, variant = "top") {
        const grid = document.createElement("div");
        grid.className =
          variant === "compare"
            ? "score-word-grid score-word-compare"
            : "score-word-grid";

        const chars = String(word || "")
          .toUpperCase()
          .split("");
        const selectedByIndex = [];

        chars.forEach((char, index) => {
          if (char === " ") return;
          selectedByIndex[index] = pickAlphabetPattern(
            char,
            cachedAlphabetPatternMap,
            "random",
          );
        });

        chars.forEach((char, index) => {
          if (char === " ") {
            appendEmptyScoreWordCols(grid, 5);
            return;
          }

          const selected = selectedByIndex[index];
          const nextSelected = selectedByIndex[index + 1];

          if (!selected) {
            grid.appendChild(createScoreWordColumn("00000"));
          } else {
            selected.pattern.split("/").forEach((bits) => {
              grid.appendChild(createScoreWordColumn(bits));
            });
          }

          const gapCount = getKerningGap(
            selected?.label || "",
            nextSelected?.label || "",
            cachedKerningMap,
            1,
          );

          appendEmptyScoreWordCols(grid, gapCount);
        });

        requestAnimationFrame(() => {
          const parent = grid.parentElement;
          if (!parent) return;

          const rect = grid.getBoundingClientRect();
          const parentRect = parent.getBoundingClientRect();
          const widthRatio = variant === "compare" ? 0.96 : 0.84;
          const heightRatio = variant === "compare" ? 0.82 : 0.62;
          const scaleX =
            rect.width > 0 ? (parentRect.width * widthRatio) / rect.width : 1;

          const scaleY =
            rect.height > 0
              ? (parentRect.height * heightRatio) / rect.height
              : 1;
          const scale = Math.min(scaleX, scaleY, maxScale);
          grid.style.transform = `scale(${scale})`;
        });

        return grid;
      }

      function renderAlphabetTape(tapeRows, patternMap, kerningMap = {}) {
        alphabetTape.innerHTML = "";

        const firstSpeed = parseFloat(tapeRows[0]?.speed || "0.5");

        alphabetIntroSpeed =
          Number.isFinite(firstSpeed) && firstSpeed > 0 ? firstSpeed * 6 : 3;

        tapeRows.forEach((tapeRow) => {
          const text = String(tapeRow.text || "");
          const mode = String(tapeRow.mode || "random")
            .trim()
            .toLowerCase();

          const chars = text.split("");

          const selectedByIndex = [];

          chars.forEach((char, index) => {
            if (char === " ") return;

            selectedByIndex[index] = pickAlphabetPattern(
              char,
              patternMap,
              mode,
            );
          });

          chars.forEach((char, index) => {
            if (char === " ") {
              appendEmptyAlphabetCols(alphabetTape, 5);
              return;
            }

            const selected = selectedByIndex[index];
            const nextSelected = selectedByIndex[index + 1];

            if (!selected) {
              alphabetTape.appendChild(createAlphabetCol("00000"));
            } else {
              selected.pattern.split("/").forEach((bits) => {
                alphabetTape.appendChild(createAlphabetCol(bits));
              });
            }

            const gapCount = getKerningGap(
              selected?.label || "",
              nextSelected?.label || "",
              kerningMap,
              1,
            );

            appendEmptyAlphabetCols(alphabetTape, gapCount);
          });

          appendEmptyAlphabetCols(alphabetTape, 3);
        });
      }

      function finishIntroSequence(alphabetPaper) {
        if (introIsFinishing) return;

        introIsFinishing = true;

        if (introScrollAnimation) {
          cancelAnimationFrame(introScrollAnimation);
          introScrollAnimation = null;
        }

        if (alphabetPaper) {
          alphabetPaper.style.transform = "";
        }

        setBodyMode("mode-opening");

        setTimeout(() => {
          setBodyMode("mode-open");
        }, 1420);
      }

      function playIntroSequence() {
        if (introHasPlayed || !alphabetTape.children.length) {
          setBodyMode("mode-open");
          return;
        }

        introHasPlayed = true;
        introIsFinishing = false;
        alphabetIntroBoost = 0;
        setBodyMode("mode-intro");

        const section = document.getElementById("alphabetSection");
        const alphabetPaper = document.querySelector(
          ".alphabet-section .punch-paper",
        );

        if (!alphabetPaper) {
          setBodyMode("mode-open");
          return;
        }

        section.scrollLeft = 0;
        alphabetIntroX = window.innerWidth;
        alphabetPaper.style.transform = `translateX(${alphabetIntroX}px)`;

        requestAnimationFrame(() => {
          const paperWidth = alphabetPaper.offsetWidth;
          const endX = -(paperWidth + 30);
          const speed = alphabetIntroSpeed;

          function step() {
            if (introIsFinishing) return;

            alphabetIntroX -= speed + alphabetIntroBoost;

            alphabetIntroBoost *= 0.92;

            if (alphabetIntroBoost < 0.05) {
              alphabetIntroBoost = 0;
            }

            alphabetPaper.style.transform = `translateX(${alphabetIntroX}px)`;

            if (alphabetIntroX <= endX) {
              finishIntroSequence(alphabetPaper);
              return;
            }

            introScrollAnimation = requestAnimationFrame(step);
          }

          introScrollAnimation = requestAnimationFrame(step);
        });
      }

      window.addEventListener(
        "wheel",
        (e) => {
          if (!body.classList.contains("mode-intro")) return;
          if (introIsFinishing) return;

          const alphabetPaper = document.querySelector(
            ".alphabet-section .punch-paper",
          );

          if (!alphabetPaper) return;

          const paperWidth = alphabetPaper.offsetWidth;
          const endX = -(paperWidth + 30);
          const wheelBoost = Math.abs(e.deltaY) * 0.09;

          alphabetIntroX -= wheelBoost;
          alphabetIntroBoost += Math.abs(e.deltaY) * 0.01;
          alphabetIntroBoost = Math.min(alphabetIntroBoost, 28);

          alphabetPaper.style.transform = `translateX(${alphabetIntroX}px)`;

          if (alphabetIntroX <= endX) {
            finishIntroSequence(alphabetPaper);
          }
        },
        { passive: true },
      );

      async function initCMS() {
        try {
          clearTapes();

          const [
            metaRows,
            itemRows,
            compareRows,
            suggestionRows,
            alphabetRows,
            kerningRows,
            alphabetTapeRows,
            imageMap,
          ] = await Promise.all([
            loadCSV(META_GID),
            loadCSV(ITEMS_GID),
            loadCSV(COMPARE_GID),
            loadCSV(SUGGESTIONS_GID),
            loadOptionalCSV(ALPHABET_GID),
            loadOptionalCSV(KERNING_GID),
            loadOptionalCSV(ALPHABET_TAPE_GID),
            loadImageJSON(),
          ]);

          META = buildMeta(metaRows);
          applyMeta(META);
          cachedAlphabetTapeRows = alphabetTapeRows;
          cachedAlphabetPatternMap = buildAlphabetPatternMap(alphabetRows);
          cachedKerningMap = buildKerningMap(kerningRows);
          cachedImageMap = imageMap || {};
          renderAlphabetTape(
            cachedAlphabetTapeRows,
            cachedAlphabetPatternMap,
            cachedKerningMap,
          );

          const items = itemRows.map((row) => ({
            id: row.id,
            title: row.title,
            description: row.description,
            category: row.category,
            openness: toBool(row.openness),
            sharing: toBool(row.sharing),
            participation: toBool(row.participation),
            contribution: toBool(row.contribution),
            collaboration: toBool(row.collaboration),
          }));

          const compareById = {};

          compareRows.forEach((row) => {
            compareById[row.id] = row;
          });

          items.forEach((item) => {
            topTape.appendChild(createTopCol(item));

            const compareData = {
              ...item,
              ...(compareById[item.id] || {}),
            };

            compareTape.appendChild(createCompareCol(compareData));
          });

          suggestionRows
            .map(normalizeSuggestionRow)
            .filter((entry) => {
              return String(entry.visible).trim().toUpperCase() === "TRUE";
            })
            .reverse()
            .forEach((entry) => {
              suggestTape.appendChild(createSuggestGuestbookCol(entry));
            });

          requestAnimationFrame(() => {
            bSuggS.scrollLeft = 0;
            playIntroSequence();
          });
        } catch (err) {
          console.error(err);
          topTape.innerHTML = `
        <div style="padding:30px; color:red; white-space:nowrap;">
          CMS 데이터를 불러오지 못했습니다. 시트 공유 설정, SPREADSHEET_ID, gid를 확인하세요.
        </div>
      `;
        }
      }

      async function submitSuggestion() {
        const nameInput = document.getElementById("nameInput");
        const messageInput = document.getElementById("msgInput");

        const name = nameInput.value.trim();
        const message = messageInput.value.trim();

        if (!name || !message) return;

        const time = getCurrentTimestamp();

        const entry = {
          name,
          message,
          time,
          replyName: "",
          reply: "",
          replyTime: "",
        };

        const newGuestbook = createSuggestGuestbookCol(entry);
        suggestTape.insertBefore(newGuestbook, suggestTape.firstChild);

        requestAnimationFrame(() => {
          bSuggS.scrollTo({
            left: 0,
            behavior: "smooth",
          });
        });

        nameInput.value = "";
        messageInput.value = "";
        messageInput.style.height = "120px";
        messageInput.style.overflowY = "hidden";

        if (!SUGGEST_POST_URL || SUGGEST_POST_URL.includes("여기에_")) {
          console.warn(
            "SUGGEST_POST_URL이 아직 설정되지 않았습니다. 화면에는 추가됐지만 시트에는 저장되지 않았습니다.",
          );
          return;
        }

        try {
          await fetch(SUGGEST_POST_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
              "Content-Type": "text/plain;charset=utf-8",
            },
            body: JSON.stringify({
              name,
              message,
              time,
            }),
          });
        } catch (err) {
          console.error("Suggestion save failed:", err);
        }
      }

      let isSyncing = false;

      topS.addEventListener("scroll", () => {
        if (body.classList.contains("mode-compare") && !isSyncing) {
          isSyncing = true;
          bCompS.scrollLeft = topS.scrollLeft;
          isSyncing = false;
        }
      });

      bCompS.addEventListener("scroll", () => {
        if (body.classList.contains("mode-compare") && !isSyncing) {
          isSyncing = true;
          topS.scrollLeft = bCompS.scrollLeft;
          isSyncing = false;
        }
      });

      [topS, bCompS, bSuggS].forEach((s) => {
        s.addEventListener("wheel", (e) => {
          const verticalScrollTarget = e.target.closest(
            "#msgInput, .guest-message, .guest-reply, .title-desc-box",
          );

          if (
            verticalScrollTarget &&
            verticalScrollTarget.scrollHeight >
              verticalScrollTarget.clientHeight
          ) {
            e.stopPropagation();

            return;
          }

          if (e.deltaY !== 0) {
            e.preventDefault();

            s.scrollLeft += e.deltaY * 1.2;
          }
        });
      });

      function setMode(m) {
        setBodyMode(body.classList.contains(m) ? "mode-open" : m);
        if (m === "mode-compare") bCompS.scrollLeft = topS.scrollLeft;
      }

      function closeImageMask() {
        if (!body.classList.contains("image-mask-on")) return;

        body.classList.remove("image-mask-on");
        if (imageBackground) imageBackground.removeAttribute("src");
      }

      document.addEventListener("click", (e) => {
        if (!body.classList.contains("image-mask-on")) return;
        if (e.target.closest(".compare-image-strip img")) return;

        closeImageMask();
      });

      document.getElementById("nav-open").onclick = () => {
        showAlphabetOverlayWord("OPEN", 1200, 1);

        setMode("mode-open");
      };

      document.getElementById("nav-compare").onclick = (e) => {
        e.stopPropagation();
        showAlphabetOverlayWord("COMPARE", 1200, 1);
        setMode("mode-compare");
      };

      document.getElementById("nav-suggest").onclick = (e) => {
        e.stopPropagation();
        showAlphabetOverlayWord("SUGGESTIONS", 1200, 1);
        setMode("mode-suggest");
      };

      const categoryDropdown = document.getElementById("categoryDropdown");
      const categoryToggle = document.getElementById("categoryToggle");
      const categoryMenu = document.getElementById("categoryMenu");

      let activeCategory = "";

      function renderCategoryMenu(options) {
        categoryMenu.innerHTML = `
          <div class="category-menu-start" aria-hidden="true"></div>
          ${options.map((option) => `<div class="category-option">${option}</div>`).join("")}
        `;
      }

      function toggleCategoryDropdown() {
        const isOpen = categoryDropdown.classList.toggle("open");
        categoryToggle.setAttribute("aria-expanded", String(isOpen));
        categoryMenu.setAttribute("aria-hidden", String(!isOpen));
      }

      function highlightCategory(categoryName) {
        const shouldClear = activeCategory === categoryName;
        activeCategory = shouldClear ? "" : categoryName;
        const isClearingCategory = shouldClear;

        if (categoryRevealTimer) {
          clearTimeout(categoryRevealTimer);
          categoryRevealTimer = null;
        }

        const targetColumns = document.querySelectorAll(
          "#topTape .item-column, #compareTape .item-column",
        );

        targetColumns.forEach((col) => {
          const category = col.dataset.category || "";
          const isMatch = !activeCategory || category.includes(activeCategory);

          col.classList.remove("category-muted");
          col.classList.remove("category-hidden");
          col.classList.remove("category-reveal");
          col.classList.remove("category-folding");
          col.classList.remove("category-unfold-refold");
          col.classList.remove("expanded");

          if (!isMatch) {
            col.classList.add("category-hidden");
            return;
          }

          if (activeCategory) {
            col.classList.add("category-folding");
          } else if (isClearingCategory) {
            col.classList.add("category-unfold-refold");
          }
        });

        if (activeCategory) {
          showCategoryWord(activeCategory);

          categoryRevealTimer = setTimeout(() => {
            targetColumns.forEach((col) => {
              col.classList.remove("category-folding");
            });
            categoryRevealTimer = null;
          }, 1420);
        } else if (isClearingCategory) {
          categoryRevealTimer = setTimeout(() => {
            targetColumns.forEach((col) => {
              col.classList.remove("category-unfold-refold");
            });
            categoryRevealTimer = null;
          }, 2220);
        }

        document.querySelectorAll(".category-option").forEach((option) => {
          const isActive = option.textContent.trim() === activeCategory;
          option.classList.toggle("active", isActive);
        });

        topS.scrollLeft = 0;
        bCompS.scrollLeft = 0;
      }

      categoryToggle.addEventListener("click", (e) => {
        e.stopPropagation();
        toggleCategoryDropdown();
      });

      categoryToggle.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          toggleCategoryDropdown();
        }
      });

      categoryMenu.addEventListener("click", (e) => {
        const option = e.target.closest(".category-option");
        if (!option) return;

        e.stopPropagation();
        highlightCategory(option.textContent.trim());
      });

      document.addEventListener("click", (e) => {
        if (!categoryDropdown.contains(e.target)) {
          categoryDropdown.classList.remove("open");
          categoryToggle.setAttribute("aria-expanded", "false");
          categoryMenu.setAttribute("aria-hidden", "true");
        }
      });

      document
        .getElementById("submitBtn")
        .addEventListener("click", submitSuggestion);

      const SIDEBAR_H = 450;

      msgInput.addEventListener("input", function () {
        this.style.height = "120px";
        const maxMsgH = SIDEBAR_H - 178;

        if (this.scrollHeight >= maxMsgH) {
          this.style.height = maxMsgH + "px";
          this.style.overflowY = "auto";
        } else {
          this.style.height = this.scrollHeight + "px";
          this.style.overflowY = "hidden";
        }
      });

      msgInput.onwheel = (e) => {
        if (msgInput.scrollHeight > msgInput.clientHeight) e.stopPropagation();
      };

      document.addEventListener("click", (e) => {
        if (!body.classList.contains("mode-intro")) return;
        if (!cachedAlphabetTapeRows.length) return;

        e.preventDefault();
        renderAlphabetTape(
          cachedAlphabetTapeRows,
          cachedAlphabetPatternMap,
          cachedKerningMap,
        );
        const alphabetPaper = document.querySelector(
          ".alphabet-section .punch-paper",
        );
        if (alphabetPaper) {
          alphabetPaper.style.transform = `translateX(${alphabetIntroX}px)`;
        }
      });

      async function enableCameraMask() {
        if (cameraStream) {
          cameraStream.getTracks().forEach((track) => track.stop());
          cameraStream = null;
          cameraBackground.srcObject = null;
          body.classList.remove("camera-mask-on");
          return;
        }

        try {
          cameraStream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: false,
          });

          cameraBackground.srcObject = cameraStream;
          body.classList.add("camera-mask-on");
        } catch (err) {
          console.error("Camera permission failed:", err);
          alert("카메라 권한을 허용해야 마스크 모드를 사용할 수 있습니다.");
        }
      }

      cameraToggle.addEventListener("click", (e) => {
        e.stopPropagation();
        showAlphabetOverlayWord("CAMERA", 1200, 1);
        enableCameraMask();
      });

      cameraToggle.addEventListener("keydown", (e) => {
        if (e.key !== "Enter" && e.key !== " ") return;
        e.preventDefault();
        e.stopPropagation();
        showAlphabetOverlayWord("CAMERA", 1200);
        enableCameraMask();
      });

      initCMS();
    </script>
  </body>
</html>
