<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WELLCOME TO OPEN</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body class="mode-intro">
    <video id="cameraBackground" autoplay playsinline muted></video>
    <img id="imageBackground" alt="" />
    <main class="container">
      <section class="section alphabet-section" id="alphabetSection" aria-label="알파벳 테이프">
        <div class="punch-paper">
          <div class="tape-body" id="alphabetTape"></div>
        </div>
      </section>

      <section class="section" id="topSection" aria-label="오픈 항목 테이프">
        <div class="punch-paper">
          <div class="tape-body" id="topTape"></div>
        </div>
      </section>

      <header class="middle-bar">
        <h1 class="visually-hidden">OPEN</h1>
        <nav class="left-info" aria-label="주요 메뉴">
          <span id="nav-open">오픈</span>
          <span id="nav-compare">비교하기</span>
          <span id="nav-suggest">제안하기</span>
          <div class="category-dropdown-wrap" id="categoryDropdown">
            <div
              id="categoryToggle"
              role="button"
              tabindex="0"
              aria-expanded="false"
            >
              <span id="categoryLabel">카테고리</span>
              <span class="category-triangle" aria-hidden="true"></span>
            </div>
            <div class="category-menu" id="categoryMenu" aria-hidden="true">
              <div class="category-menu-start" aria-hidden="true"></div>
            </div>
          </div>
        </nav>

        <div class="right-info">
          <span
            id="cameraToggle"
            role="button"
            tabindex="0"
            aria-label="Toggle camera mask"
          ></span>
          <a class="playlist-link" id="playlistLink" target="_blank" href="#"
            >▶ Playlist for OPEN</a
          >
          <span class="update-info"
            >Last Update: <span id="currentDate"></span
          ></span>
        </div>
      </header>

      <section class="bottom-area" aria-label="상세 정보와 참여 영역">
        <section id="descriptionWrapper" class="keep-all" aria-label="설명">
          <div class="desc-text keep-all" id="descriptionText"></div>
        </section>

        <section class="bottom-group" id="bottomCompareGroup" aria-label="비교하기">
          <section class="section" id="bottomCompareSection" aria-label="비교 테이프">
            <div class="punch-paper">
              <div class="tape-body" id="compareTape"></div>
            </div>
          </section>
        </section>

        <section class="bottom-group" id="bottomSuggestGroup" aria-label="제안하기">
          <section class="section" id="bottomSuggestSection" aria-label="제안 테이프">
            <div class="punch-paper">
              <div class="tape-body" id="suggestTape"></div>
            </div>
          </section>

          <div class="suggest-fixed-hole-area" aria-hidden="true">
            <div class="hole large active"></div>
            <div class="hole large active"></div>
            <div class="hole large active"></div>
            <div class="hole large active"></div>
            <div class="hole large active"></div>
            <div class="hole small active"></div>
            <div class="hole large active"></div>
            <div class="hole large active"></div>
            <div class="hole large active"></div>
          </div>
          <aside id="suggestLayer" aria-label="제안 입력">
            <div class="suggest-inner">
              <div class="name-row">
                <span class="name-label">이름</span>
                <div class="underline-wrapper">
                  <input
                    type="text"
                    id="nameInput"
                    placeholder="이름을 입력해주세요"
                  />
                  <div class="input-stroke"></div>
                </div>
              </div>

              <div class="msg-box">
                <textarea
                  id="msgInput"
                  placeholder="제안이나 질문사항을 남겨주세요"
                  class="keep-all"
                ></textarea>
              </div>

              <div id="submitBtn">
                <span class="submit-label">남기기</span>
              </div>
            </div>
          </aside>
        </section>
      </section>

      <div
        id="categoryWordOverlay"
        class="category-word-overlay"
        aria-hidden="true"
      ></div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
